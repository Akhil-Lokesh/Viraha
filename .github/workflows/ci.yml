name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Typecheck backend
        working-directory: ./backend
        run: npx tsc --noEmit

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: ./frontend
        run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & build backend
        working-directory: ./backend
        run: |
          npm ci
          npm run build

      - name: Install & build frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Audit backend
        working-directory: ./backend
        run: |
          npm ci
          npm audit --audit-level=high || true

      - name: Audit frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm audit --audit-level=high || true
