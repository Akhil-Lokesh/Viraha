name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Typecheck backend
        working-directory: ./backend
        run: npx tsc --noEmit

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: ./frontend
        run: npx tsc --noEmit

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: viraha_test
          POSTGRES_USER: viraha
          POSTGRES_PASSWORD: viraha_test_password
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run tests
        working-directory: ./backend
        env:
          TEST_DATABASE_URL: postgresql://viraha:viraha_test_password@localhost:5434/viraha_test
          DATABASE_URL: postgresql://viraha:viraha_test_password@localhost:5434/viraha_test
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-at-least-10-chars
          JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-10-chars
        run: npm run test:coverage

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run tests
        working-directory: ./frontend
        run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, frontend-tests]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & build backend
        working-directory: ./backend
        run: |
          npm ci
          npm run build

      - name: Install & build frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Audit backend
        working-directory: ./backend
        run: |
          npm ci
          npm audit --audit-level=high || true

      - name: Audit frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm audit --audit-level=high || true
